services:
  - type: web_service
    name: boutique-backend
    env: node
    plan: starter
    branch: main
    root: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    # Add Render environment variables in the dashboard or update this file with real values.
    # Recommended env vars:
    # - DATABASE_URL or SUPABASE_URL
    # - SUPABASE_KEY
    # - JWT_SECRET
    # - CORS_ORIGINS
